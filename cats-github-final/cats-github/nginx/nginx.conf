events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=cats_api:10m rate=30r/m;
    limit_req_status 429;

    log_format json_combined escape=json
        '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,"ip":"$remote_addr","duration":$request_time}';

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         DENY;
        add_header Strict-Transport-Security "max-age=31536000" always;

        access_log /var/log/nginx/access.log json_combined;

        location / {
            limit_req zone=cats_api burst=10 nodelay;
            proxy_pass http://app:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://app:8000/health;
            access_log off;
        }
    }
}
