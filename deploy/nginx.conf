# CATS reverse proxy.
# Mounted at /etc/nginx/conf.d/default.conf (included inside the http{} block).
#
# Provides: rate limiting (30 req/min/IP, matching the in-app Redis limiter),
# security headers, and correct X-Forwarded-For so the app sees the real client
# IP (cats.core.security.get_client_ip reads it).

# 30 requests/minute per client IP; 10MB keeps state for ~160k IPs.
limit_req_zone $binary_remote_addr zone=cats_limit:10m rate=30r/m;

upstream cats_app {
    server app:8000;
    keepalive 32;
}

# Shared proxy + security configuration.
# (Repeated per server below; kept inline for a single self-contained file.)

server {
    listen 80;
    server_name _;

    # Rate limit: allow short bursts, reject the rest with 429.
    limit_req zone=cats_limit burst=10 nodelay;
    limit_req_status 429;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://cats_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # /metrics is unauthenticated — restrict it to internal networks in prod.
    location = /metrics {
        # allow 10.0.0.0/8; allow 172.16.0.0/12; deny all;
        proxy_pass http://cats_app;
        proxy_set_header Host $host;
    }
}

